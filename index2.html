<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sword Demo v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;overflow:hidden;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'Arial',sans-serif;color:#fff;
  touch-action:none;
}
#wrap{
  position:relative;
  width:min(100vw,calc(100vh * 16/9));
  height:min(100vh,calc(100vw * 9/16));
  overflow:hidden;background:#0a0a0f;
  touch-action:none;
}
canvas{width:100%;height:100%;display:block;}
#ui{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}
/* crosshair — center fixed */
#xhair{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:3.5vw;height:3.5vw;
  pointer-events:none;z-index:5;
}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,0.92);}
#xhair::before{width:100%;height:1.5px;top:50%;left:0;transform:translateY(-50%);}
#xhair::after{width:1.5px;height:100%;left:50%;top:0;transform:translateX(-50%);}
.xdot{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:0.55vw;height:0.55vw;
  background:rgba(255,255,255,0.95);border-radius:50%;
}
/* HP */
#php-wrap{position:absolute;bottom:22%;left:2%;width:26%;}
#ehp-wrap{position:absolute;top:5%;left:50%;transform:translateX(-50%);width:34%;}
.hplabel{font-size:1.3vw;color:#aaa;margin-bottom:2px;letter-spacing:1px;}
.hpbg{width:100%;height:1.3vw;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);}
#pbar{height:100%;background:linear-gradient(90deg,#2ecc71,#27ae60);border-radius:3px;transition:width 0.3s;}
#ebar{height:100%;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:3px;transition:width 0.3s;}
.hpnum{font-size:1.1vw;color:#eee;margin-top:1px;}
#sw-state{position:absolute;top:5%;right:2%;font-size:1.3vw;color:#f39c12;text-align:right;}
#smsg{
  position:absolute;top:17%;left:50%;transform:translateX(-50%);
  font-size:2.8vw;font-weight:bold;letter-spacing:2px;
  text-shadow:0 0 14px currentColor;
  opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;
}
#combo{
  position:absolute;top:14%;right:2%;
  font-size:2vw;font-weight:bold;
  color:#f39c12;text-shadow:0 0 8px #f39c12;
  opacity:0;transition:opacity 0.3s;
}
/* Parry: appears AT crosshair, player taps attack button */
#pzone{
  position:absolute;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5vw;font-weight:bold;
  opacity:0;transition:opacity 0.15s;
  pointer-events:none;
  z-index:6;
  transform:translate(-50%,-50%);
}
#flash{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;opacity:0;transition:opacity 0.08s;
}
/* Full-screen touch: LEFT half = move-pad spawn area, RIGHT half = look drag */
#touch-layer{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:all;
  touch-action:none;
  z-index:1; /* ボタン(z-index:3)より下 */
}
#touch-layer-bottom{
  display:none; /* 不要 */
}
/* virtual move stick (rendered on canvas, not DOM) */
/* Buttons: right side bottom */
#btns{
  position:absolute;bottom:2%;right:2%;
  display:flex;flex-direction:column;gap:1vw;align-items:flex-end;
  pointer-events:all;z-index:10;
}
.btn-row{display:flex;gap:1.5vw;align-items:flex-end;}
.abtn{
  background:rgba(15,15,25,0.88);border-radius:50%;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background 0.1s,transform 0.08s;line-height:1.2;text-align:center;
}
.abtn:active{background:rgba(255,255,255,0.22);transform:scale(0.91);}
.abtn .ico{font-size:3vw;}
.abtn .lbl{font-size:1vw;color:#aaa;margin-top:1px;}
.abtn-L{width:11vw;height:11vw;border:1.5px solid #e74c3c;}
.abtn-M{width:8.5vw;height:8.5vw;border:1.5px solid #f39c12;}
.abtn-S{width:6.5vw;height:6.5vw;border:1.5px solid #3498db;}
/* Screens */
.fullscreen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:all;z-index:20;
}
#sstart{background:rgba(0,0,0,0.87);}
#sstart h1{font-size:4vw;letter-spacing:4px;color:#f39c12;text-shadow:0 0 20px #f39c12;margin-bottom:2%;}
#sstart p{font-size:1.5vw;color:#aaa;margin-bottom:0.7%;}
#sstart button{
  margin-top:3%;padding:1.2% 5%;
  background:#e74c3c;border:none;border-radius:6px;
  color:#fff;font-size:2vw;cursor:pointer;letter-spacing:2px;
}
#sdead{background:rgba(0,0,0,0.75);display:none;}
#sdead h2{font-size:4.5vw;color:#e74c3c;text-shadow:0 0 20px #e74c3c;margin-bottom:3%;}
#sdead button{
  padding:1% 4%;background:#2980b9;
  border:none;border-radius:6px;color:#fff;font-size:1.8vw;cursor:pointer;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="xhair"><div class="xdot"></div></div>
    <div id="php-wrap">
      <div class="hplabel">PLAYER</div>
      <div class="hpbg"><div id="pbar"></div></div>
      <div class="hpnum" id="pnum">100 / 100</div>
    </div>
    <div id="ehp-wrap">
      <div class="hplabel" style="text-align:center">GOBLIN</div>
      <div class="hpbg"><div id="ebar"></div></div>
      <div class="hpnum" id="enum" style="text-align:center">400 / 400</div>
    </div>
    <div id="sw-state">⚔️ 剣: 背中</div>
    <div id="smsg"></div>
    <div id="combo"></div>
    <div id="pzone"></div>
    <div id="flash"></div>

    <!-- full-screen touch layer (behind buttons) -->
    <div id="touch-layer"></div>
    <div id="touch-layer-bottom"></div>

    <!-- action buttons -->
    <div id="btns">
      <div class="btn-row">
        <button class="abtn abtn-S" id="btn-spawn" ontouchstart="event.preventDefault();event.stopPropagation();spawnEnemy();" onclick="spawnEnemy()">
          <span class="ico">👹</span><span class="lbl">出現 [E]</span>
        </button>
        <button class="abtn abtn-M" id="btn-draw" ontouchstart="event.preventDefault();event.stopPropagation();toggleSword();" onclick="toggleSword()">
          <span class="ico">🗡️</span><span class="lbl">抜刀 [R]</span>
        </button>
        <button class="abtn abtn-L" id="btn-atk" ontouchstart="event.preventDefault();event.stopPropagation();playerAttack();" onclick="playerAttack()">
          <span class="ico">⚔️</span><span class="lbl">攻撃 [LClick]</span>
        </button>
      </div>
    </div>

    <!-- PC hint overlay -->
    <div id="pc-hint" style="display:none;position:absolute;bottom:12%;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.2);border-radius:8px;
      padding:1% 2%;font-size:1.3vw;color:#aaa;pointer-events:none;z-index:8;
      flex-direction:column;align-items:center;gap:4px;">
      <span>🖱 画面をクリックでカーソル非表示・マウスでそのまま視点操作</span>
      <span>左クリック → 攻撃 ／ R 抜刀 ／ E スポーン ／ Esc でカーソル復帰</span>
    </div>
    <div class="fullscreen" id="sstart">
      <h1>⚔️ SWORD DEMO v4</h1>
      <p>🖥 <b>PC:</b> WASD移動 / クリックでカーソル非表示→マウス視点 / 左クリック攻撃 / R抜刀 / Eスポーン</p>
      <p>📱 <b>Mobile:</b> 左ドラッグ移動 / 右ドラッグ視点 / ボタンで操作</p>
      <p>🔴 赤リング出現 → クロスヘアを合わせて攻撃ボタンでパリィ！</p>
      <button onclick="startGame()">START</button>
    </div>
    <div class="fullscreen" id="sdead">
      <h2>💀 YOU DIED</h2>
      <button onclick="retryGame()">RETRY</button>
    </div>
  </div>
</div>

<script>
// ── canvas ──
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
function resize(){canvas.width=wrap.offsetWidth;canvas.height=wrap.offsetHeight;}
resize();
window.addEventListener('resize',resize);

// ── state ──
const G={
  running:false,
  swordDrawn:false,
  playerHP:100,playerMaxHP:100,
  enemy:null,
  camYaw:0,camPitch:0.08,
  playerX:0,playerZ:0,
  moveX:0,moveZ:0,
  combo:0,comboTimer:0,
  attackAnim:0,attackTimer:0,
  walkPhase:0,
  drawAnim:0,drawAnimDir:0,
  frameT:0,
  parryReady:false,
  parryTimer:0,
  parryCallback:null,
  parryWorldY:1.0,      // ワールド座標Y（攻撃部位高さ）
  parryWorldX:0,        // ワールド座標X（敵位置）
  parryWorldZ:0,        // ワールド座標Z（敵位置）
  parrySideOff:0,       // 左右オフセット（ワールド空間）
  // virtual stick
  stickActive:false,
  stickOriginX:0,stickOriginY:0,
  stickDX:0,stickDY:0,
  stickTouchId:null,
  // look drag
  lookActive:false,
  lookLastX:0,lookLastY:0,
  lookTouchId:null,
};

// ── enemy ──
function mkEnemy(){
  return{hp:400,maxHP:400,x:0,z:-5.5,
    state:'idle',timer:0,walkDir:0,
    swingT:0,swingSide:1,swingHeight:0.5,
    legPhase:0,parryOut:false,_ptout:null};
}

// ── helpers ──
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function showMsg(txt,col,dur=900){
  const el=document.getElementById('smsg');
  el.textContent=txt;el.style.color=col;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',dur);
}
function flashScreen(col){
  const f=document.getElementById('flash');
  f.style.background=col;f.style.opacity='0.45';
  setTimeout(()=>f.style.opacity='0',120);
}
function updateHP(){
  document.getElementById('pbar').style.width=(G.playerHP/G.playerMaxHP*100)+'%';
  document.getElementById('pnum').textContent=`${Math.max(0,G.playerHP)} / ${G.playerMaxHP}`;
  const e=G.enemy;
  if(e){
    document.getElementById('ebar').style.width=(e.hp/e.maxHP*100)+'%';
    document.getElementById('enum').textContent=`${Math.max(0,e.hp)} / ${e.maxHP}`;
  }
}
function updateCombo(){
  const el=document.getElementById('combo');
  if(G.combo>=2){el.textContent=`COMBO ×${G.combo}`;el.style.opacity='1';}
  else el.style.opacity='0';
}

// ── parry: appears AT crosshair (center), player taps attack btn ──
function openParryWindow(cb,dur=900){
  const e=G.enemy;
  // 攻撃部位のワールド座標を記録（カメラ変化に追従するためcanvasで毎フレーム描画）
  G.parryWorldY  = e.swingHeight===0 ? 0.3 : e.swingHeight===0.5 ? 1.0 : 1.7;
  G.parryWorldX  = e.x;
  G.parryWorldZ  = e.z;
  // swingSide: +1=敵右手から=プレイヤー左側, -1=逆
  G.parrySideOff = -e.swingSide * 0.45; // ワールド空間での横オフセット
  G.parryReady   = true;
  G.parryCallback= cb;
  G.parryTimer   = dur;
}
function closeParryWindow(){
  G.parryReady=false;G.parryCallback=null;G.parryTimer=0;
}

// ── enemy AI ──
function enemyAI(dt){
  const e=G.enemy;
  if(!e||e.state==='dead')return;
  e.timer-=dt;
  const dx=G.playerX-e.x,dz=G.playerZ-e.z;
  const dist=Math.sqrt(dx*dx+dz*dz);

  if(e.state==='idle'){
    if(e.timer<=0){e.state='walk';e.timer=800+Math.random()*400;e.walkDir=Math.atan2(dx,dz);}
  }
  if(e.state==='walk'){
    const spd=0.0025*dt;
    e.x+=Math.sin(e.walkDir)*spd;e.z+=Math.cos(e.walkDir)*spd;
    e.walkDir=lerp(e.walkDir,Math.atan2(dx,dz),0.12);
    e.legPhase+=dt*0.007;
    // 攻撃範囲(2.7m)に入った時だけ攻撃開始（タイマー切れは無視）
    if(dist<2.7){
      e.state='windup';e.timer=650+Math.random()*350;
      e.swingSide=Math.random()<0.5?1:-1;
      const hv=Math.random();
      e.swingHeight=hv<0.33?0:hv<0.66?0.5:1;
      e.swingT=0;e.parryOut=false;
    }
  }
  if(e.state==='windup'){
    e.swingT=clamp(e.swingT+dt*0.001,0,0.55);
    if(e.timer<=0&&!e.parryOut){
      e.parryOut=true;
      e._ptout=setTimeout(()=>{
        if(G.parryReady){
          closeParryWindow();
          if(e.state!=='stun'&&e.state!=='dead')takeDamage();
        }
      },950);
      openParryWindow((ok)=>{
        clearTimeout(e._ptout);
        if(ok){
          e.state='stun';e.timer=1300;e.swingT=0;
          showMsg('⚡ PARRY!','#f39c12',800);
          flashScreen('rgba(243,156,18,0.35)');
        } else {
          if(e.state!=='stun'&&e.state!=='dead')takeDamage();
        }
      });
      e.state='attack';e.timer=600;
    }
  }
  if(e.state==='attack'){
    e.swingT=clamp(e.swingT+dt*0.003,0,1);
    if(e.timer<=0){e.state='idle';e.timer=900+Math.random()*500;e.swingT=0;e.parryOut=false;}
  }
  if(e.state==='stun'){if(e.timer<=0){e.state='idle';e.timer=700;}}

  // parry countdown
  if(G.parryReady){
    G.parryTimer-=dt;
    if(G.parryTimer<=0){
      const cb=G.parryCallback;
      closeParryWindow();
      if(cb)cb(false);
    }
  }
}

function takeDamage(){
  const dmg=36+Math.floor(Math.random()*24);
  G.playerHP=Math.max(0,G.playerHP-dmg);
  flashScreen('rgba(231,76,60,0.52)');
  showMsg(`-${dmg} ダメージ！`,'#e74c3c',700);
  updateHP();G.combo=0;updateCombo();
  if(G.playerHP<=0)setTimeout(playerDead,400);
}

// ── actions ──
function toggleSword(){
  const now=Date.now();
  if(G._lastToggle&&now-G._lastToggle<300)return; // デバウンス
  G._lastToggle=now;
  G.swordDrawn=!G.swordDrawn;
  G.drawAnimDir=G.swordDrawn?1:-1;
  const el=document.getElementById('sw-state');
  const btn=document.getElementById('btn-draw');
  if(G.swordDrawn){
    el.textContent='⚔️ 剣: 構え';el.style.color='#e74c3c';
    btn.querySelector('.lbl').textContent='納刀';
    showMsg('⚔️ 抜刀！','#f39c12',600);
  } else {
    el.textContent='⚔️ 剣: 背中';el.style.color='#f39c12';
    btn.querySelector('.lbl').textContent='抜刀';
    showMsg('🗡 納刀','#aaa',500);
  }
}

function playerAttack(){
  // パリィウィンドウ中 → クロスヘアがサークルに重なっていればパリィ発動
  if(G.parryReady){
    // パリィサークルの現在スクリーン座標を計算
    const cosYp=Math.cos(G.camYaw),sinYp=Math.sin(G.camYaw);
    const rightXp=cosYp,rightZp=-sinYp;
    const pwx=G.parryWorldX+rightXp*G.parrySideOff;
    const pwz=G.parryWorldZ+rightZp*G.parrySideOff;
    const psp=w2s(pwx,G.parryWorldY,pwz);
    const W2=canvas.width,H2=canvas.height;
    const parryR=Math.min(W2,H2)*0.065; // drawParryCircleと同じ半径
    const aimDist=Math.sqrt((psp.x-W2/2)**2+(psp.y-H2/2)**2);
    if(psp.scale>0 && aimDist < parryR*1.2){
      // エイム合ってる → パリィ成功
      const cb=G.parryCallback;
      closeParryWindow();
      if(cb)cb(true);
    } else {
      // エイム外れてる → パリィ失敗メッセージのみ（ダメージはタイムアウトに任せる）
      showMsg('エイムを合わせろ！','#e67e22',600);
    }
    return;
  }
  if(!G.swordDrawn){showMsg('⚠️ 先に抜刀！','#e67e22',700);return;}
  const e=G.enemy;
  if(!e||e.state==='dead'){showMsg('敵がいない','#aaa',600);return;}
  G.attackAnim=1;G.attackTimer=260;

  // ── 近距離チェック（プレイヤー剣リーチ: 2.5m）──
  const SWORD_REACH=2.5;
  const ddx=e.x-G.playerX, ddz=e.z-G.playerZ;
  const realDist=Math.sqrt(ddx*ddx+ddz*ddz);
  if(realDist>SWORD_REACH){
    showMsg('近づけ！','#e67e22',500);
    return;
  }

  // ── エイム判定: クロスヘアが敵に向いているか ──
  const sp=w2s(e.x,0.9,e.z);
  const W=canvas.width,H=canvas.height;
  const screenDist=Math.sqrt((sp.x-W/2)**2+(sp.y-H/2)**2);
  const hitR=Math.min(W,H)*0.15; // 剣攻撃は近距離・エイムシビア

  if(sp.scale>0&&screenDist<hitR){
    if(Math.random()<(e.state==='stun'?0:0.20)){
      showMsg('🛡 弾かれた！','#3498db',700);
      flashScreen('rgba(52,152,219,0.3)');return;
    }
    let dmg=15+Math.floor(Math.random()*10);
    if(G.combo>=3)dmg=Math.floor(dmg*1.3);
    if(e.state==='stun')dmg=Math.floor(dmg*1.6);
    e.hp=Math.max(0,e.hp-dmg);
    G.combo++;G.comboTimer=2000;updateCombo();
    flashScreen('rgba(231,76,60,0.18)');
    showMsg(`⚔️ HIT! -${dmg}`,e.state==='stun'?'#f39c12':'#fff',600);
    updateHP();
    if(e.hp<=0){
      e.state='dead';closeParryWindow();clearTimeout(e._ptout);
      showMsg('💀 撃破！','#2ecc71',1200);
      flashScreen('rgba(46,204,113,0.2)');
      G.combo=0;updateCombo();
    }
  } else {
    showMsg('MISS','#e74c3c',500);G.combo=0;updateCombo();
  }
}

function spawnEnemy(){
  G.enemy=mkEnemy();updateHP();
  showMsg('👹 ゴブリン出現！','#e74c3c',900);
}

// ── 3D projection ──
function w2s(wx,wy,wz){
  const W=canvas.width,H=canvas.height,FOV=0.75;
  const eyeH=1.65;
  const rx=wx-G.playerX, ry=wy-eyeH, rz=wz-G.playerZ;

  // Yaw回転（左右のみ）
  const cyaw=Math.cos(G.camYaw), syaw=Math.sin(G.camYaw);
  const cx  =  rx*cyaw - rz*syaw;  // 横
  const depth= rx*syaw + rz*cyaw;  // 前後深度（scaleはこれだけで決まる）
  const ch  =  ry;                  // 高さ

  if(depth<=0.05)return{x:-9999,y:-9999,scale:0};

  // scaleはdepthのみ（pitchはscaleに影響させない）
  const sc=(H*FOV)/depth;

  // pitchはスクリーンY座標のオフセットとしてのみ適用
  const pitchOffsetY = Math.tan(G.camPitch) * (H*FOV);
  const screenY = H/2 - ch*sc + pitchOffsetY;

  return{x:W/2+cx*sc, y:screenY, scale:sc, depth:depth};
}

// ── draw ──
function drawScene(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // 地平線Y座標をcamPitchに連動（w2sと同じ式）
  // y=0（地面）をw2sに通したときのscreenY = H/2 + pitchOffsetY + eyeH*sc
  // 無限遠(depth→∞)ではsc→0なので地平線 = H/2 + pitchOffset
  const FOV=0.75;
  const horizonY = H/2 + Math.tan(G.camPitch)*(H*FOV);

  // sky
  const sky=ctx.createLinearGradient(0,0,0,horizonY);
  sky.addColorStop(0,'#060d18');sky.addColorStop(1,'#112233');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,horizonY);

  // moon（空の中に固定）
  ctx.fillStyle='rgba(255,240,180,0.7)';
  ctx.beginPath();ctx.arc(W*0.82,horizonY*0.18,H*0.025,0,Math.PI*2);ctx.fill();
  // stars
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<40;i++)ctx.fillRect((i*137+50)%W,(i*97+20)%Math.max(1,horizonY*0.9),1,1);

  // ground（地平線から下）
  const grd=ctx.createLinearGradient(0,horizonY,0,H);
  grd.addColorStop(0,'#162816');grd.addColorStop(1,'#0a100a');
  ctx.fillStyle=grd;
  ctx.fillRect(0,horizonY,W,H-horizonY);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let i=-10;i<=10;i++){
    const p1=w2s(i,0,0.5),p2=w2s(i,0,30);
    if(p1.scale>0&&p2.scale>0){ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}
  }
  for(let j=1;j<=28;j+=2.5){
    const p1=w2s(-10,0,j),p2=w2s(10,0,j);
    if(p1.scale>0){ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}
  }

  // enemy
  drawEnemy();

  // player (TPS lower body)
  drawPlayer(W,H);

  // virtual stick
  drawStick(W,H);

  // パリィサークル（ワールド追従、毎フレーム座標再計算）
  drawParryCircle(W,H);
}

function drawEnemy(){
  const e=G.enemy;
  if(!e)return;
  if(e.state==='dead'){
    const sp=w2s(e.x,0,e.z);
    if(sp.scale>0){
      const sz=sp.scale*0.6;
      ctx.save();ctx.translate(sp.x,sp.y);ctx.rotate(0.4);
      ctx.fillStyle='#5a8a3a';ctx.fillRect(-sz*0.5,-sz*0.12,sz,sz*0.25);
      ctx.fillStyle='rgba(150,0,0,0.4)';
      ctx.beginPath();ctx.ellipse(0,sz*0.05,sz*0.55,sz*0.16,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    return;
  }
  const sp=w2s(e.x,0,e.z);
  if(sp.scale<=0)return;
  const sz=sp.scale*0.85,bx=sp.x,by=sp.y;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();ctx.ellipse(bx,by,sz*0.45,sz*0.12,0,0,Math.PI*2);ctx.fill();

  const lp=e.legPhase;
  const lsw=(e.state==='walk')?Math.sin(lp)*0.13:0;
  // legs
  for(const[ox,sg]of[[-0.15,1],[0.15,-1]]){
    ctx.save();ctx.translate(bx+sz*ox,by);ctx.rotate(lsw*sg);
    ctx.fillStyle='#4a3728';ctx.fillRect(-sz*0.08,-sz*0.52,sz*0.16,sz*0.52);
    ctx.fillStyle='#2c1f13';ctx.fillRect(-sz*0.1,-sz*0.08,sz*0.2,sz*0.12);
    ctx.restore();
  }
  // torso
  let tc='#3a7a3a';
  if(e.state==='windup'||e.state==='attack')tc='#b05010';
  if(e.state==='stun')tc='#2255aa';
  ctx.fillStyle=tc;
  ctx.beginPath();ctx.roundRect(bx-sz*0.26,by-sz*1.08,sz*0.52,sz*0.6,sz*0.06);ctx.fill();

  // arms + sword swing
  const sw=e.swingT,sd=e.swingSide;
  const isAtk=e.state==='windup'||e.state==='attack';
  // left arm
  ctx.save();ctx.translate(bx-sz*0.26,by-sz*0.82);
  ctx.rotate(-0.3-(isAtk?sw*0.4:0));
  ctx.fillStyle='#3a7a3a';ctx.fillRect(-sz*0.08,0,sz*0.16,sz*0.4);
  ctx.restore();
  // right arm + sword
  ctx.save();ctx.translate(bx+sz*0.26,by-sz*0.82);
  ctx.rotate(0.3+(isAtk?sw*sd*1.9:0));
  ctx.fillStyle='#3a7a3a';ctx.fillRect(-sz*0.08,0,sz*0.16,sz*0.4);
  ctx.translate(sz*0.04,sz*0.38);
  ctx.rotate(-0.8-(isAtk?sw*sd*1.1:0));
  ctx.fillStyle='#ccc';ctx.fillRect(-sz*0.04,-sz*0.6,sz*0.08,sz*0.6);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(-sz*0.02,-sz*0.6,sz*0.02,sz*0.6);
  ctx.fillStyle='#888';ctx.fillRect(-sz*0.12,-sz*0.04,sz*0.24,sz*0.07);
  ctx.restore();

  // neck+head
  ctx.fillStyle='#5a8a3a';ctx.fillRect(bx-sz*0.08,by-sz*1.15,sz*0.16,sz*0.1);
  ctx.fillStyle='#5a8a3a';ctx.beginPath();ctx.arc(bx,by-sz*1.32,sz*0.21,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d5c28';ctx.beginPath();ctx.arc(bx,by-sz*1.32,sz*0.16,0,Math.PI);ctx.fill();
  ctx.fillStyle=(isAtk?'#ff2200':'#cc2200');
  ctx.beginPath();
  ctx.arc(bx-sz*0.08,by-sz*1.36,sz*0.05,0,Math.PI*2);
  ctx.arc(bx+sz*0.08,by-sz*1.36,sz*0.05,0,Math.PI*2);
  ctx.fill();
  // ears
  ctx.fillStyle='#5a8a3a';
  ctx.beginPath();ctx.moveTo(bx-sz*0.18,by-sz*1.38);ctx.lineTo(bx-sz*0.28,by-sz*1.5);ctx.lineTo(bx-sz*0.13,by-sz*1.28);ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+sz*0.18,by-sz*1.38);ctx.lineTo(bx+sz*0.28,by-sz*1.5);ctx.lineTo(bx+sz*0.13,by-sz*1.28);ctx.fill();

  // HP bar
  const hw=sz*0.65;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx-hw/2,by-sz*1.72,hw,sz*0.07);
  ctx.fillStyle=e.hp/e.maxHP>0.5?'#2ecc71':e.hp/e.maxHP>0.25?'#f39c12':'#e74c3c';
  ctx.fillRect(bx-hw/2,by-sz*1.72,hw*(e.hp/e.maxHP),sz*0.07);

  // パリィサークルはdrawParryCircle()でcanvasに毎フレーム描画
}

function drawPlayer(W,H){
  const isMoving=Math.abs(G.stickDX)>0.05||Math.abs(G.stickDY)>0.05;
  const wp=G.walkPhase;
  const px=W*0.5,py=H*0.98;
  const sc=H*0.0032;
  const bob=(isMoving?Math.sin(wp)*3:0);
  const da=G.drawAnim;

  // legs
  const lsw=(isMoving?Math.sin(wp)*12:0);
  for(const[ox,sg]of[[-8,1],[8,-1]]){
    ctx.save();ctx.translate(px+sc*ox,py+bob);ctx.rotate(lsw*sg*Math.PI/180);
    ctx.fillStyle='#2a3a5a';ctx.fillRect(-sc*5,-sc*30,sc*10,sc*30);
    ctx.fillStyle='#1a1a1a';ctx.fillRect(-sc*6,-sc*5,sc*13,sc*8);
    ctx.restore();
  }
  // hips
  ctx.fillStyle='#223040';ctx.fillRect(px-sc*18,py-sc*36+bob,sc*36,sc*14);
  ctx.fillStyle='#5a3a1a';ctx.fillRect(px-sc*18,py-sc*38+bob,sc*36,sc*5);
  ctx.fillStyle='#8a6a2a';ctx.fillRect(px-sc*4,py-sc*38+bob,sc*8,sc*5);
  // torso
  ctx.fillStyle='#1a2535';ctx.fillRect(px-sc*20,py-sc*75+bob,sc*40,sc*40);
  ctx.strokeStyle='rgba(100,150,200,0.3)';ctx.lineWidth=sc*1.5;
  ctx.strokeRect(px-sc*16,py-sc*70+bob,sc*32,sc*30);
  // left arm
  const laswing=(isMoving?Math.sin(wp+Math.PI)*8:0);
  ctx.save();ctx.translate(px-sc*20,py-sc*72+bob);ctx.rotate(laswing*Math.PI/180);
  ctx.fillStyle='#1a2535';ctx.fillRect(-sc*6,0,sc*12,sc*32);
  ctx.fillStyle='#2a3a2a';ctx.fillRect(-sc*6,sc*28,sc*12,sc*10);
  ctx.restore();
  // right arm
  const raswing=(isMoving?Math.sin(wp)*8:0);
  const atkAngle=(G.attackAnim>0?-G.attackAnim*1.1:0);
  ctx.save();ctx.translate(px+sc*20,py-sc*72+bob);
  ctx.rotate(raswing*Math.PI/180+atkAngle);
  ctx.fillStyle='#1a2535';ctx.fillRect(-sc*6,0,sc*12,sc*32);
  ctx.fillStyle='#2a3a2a';ctx.fillRect(-sc*6,sc*28,sc*12,sc*10);
  if(G.swordDrawn&&da>0.3){
    const swExtra=(G.attackAnim>0?G.attackAnim*0.8:0);
    ctx.save();ctx.translate(sc*2,sc*30);ctx.rotate(-0.5-swExtra);
    ctx.fillStyle='#6b3a1f';ctx.fillRect(-sc*3,0,sc*6,sc*18);
    ctx.strokeStyle='#3a2010';ctx.lineWidth=sc*1.5;
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-sc*3,sc*(3+i*4));ctx.lineTo(sc*3,sc*(5+i*4));ctx.stroke();}
    ctx.fillStyle='#8a7a6a';ctx.fillRect(-sc*8,sc*16,sc*16,sc*4);
    const bl=sc*55;
    ctx.fillStyle='#dde4f0';
    ctx.beginPath();ctx.moveTo(-sc*2.5,sc*18);ctx.lineTo(sc*2.5,sc*18);ctx.lineTo(sc*1,sc*18-bl);ctx.lineTo(-sc*1,sc*18-bl);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath();ctx.moveTo(sc*1.5,sc*18);ctx.lineTo(sc*2.5,sc*18);ctx.lineTo(sc*1,sc*18-bl);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  // sword on back
  if(!G.swordDrawn||da<0.5){
    ctx.save();ctx.globalAlpha=1-da;
    ctx.translate(px+sc*10,py-sc*75+bob);ctx.rotate(0.45);
    ctx.fillStyle='#3a2a10';ctx.fillRect(-sc*3,-sc*45,sc*6,sc*48);
    ctx.fillStyle='#aab0c0';ctx.fillRect(-sc*2,-sc*45,sc*4,sc*5);
    ctx.globalAlpha=1;ctx.restore();
  }
  // head
  ctx.fillStyle='#d4a574';ctx.beginPath();ctx.arc(px,py-sc*90+bob,sc*14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a1a08';ctx.beginPath();ctx.arc(px,py-sc*92+bob,sc*14,Math.PI,0);ctx.fill();
  ctx.fillRect(px-sc*14,py-sc*92+bob,sc*28,sc*6);
  ctx.fillStyle='#d4a574';ctx.fillRect(px-sc*7,py-sc*78+bob,sc*14,sc*8);
  ctx.fillStyle='#1a2535';ctx.fillRect(px-sc*10,py-sc*77+bob,sc*20,sc*5);
}

function drawStick(W,H){
  if(!G.stickActive)return;
  const ox=G.stickOriginX,oy=G.stickOriginY;
  const R=Math.min(W,H)*0.07;
  // outer ring
  ctx.beginPath();ctx.arc(ox,oy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fill();
  // knob
  const kx=ox+G.stickDX*R,ky=oy+G.stickDY*R;
  ctx.beginPath();ctx.arc(kx,ky,R*0.38,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
}

// ── parry circle canvas draw (world-tracked) ──
function drawParryCircle(W,H){
  if(!G.parryReady)return;
  const e=G.enemy;
  if(!e||e.state==='dead')return;

  // 毎フレーム現在のカメラでワールド→スクリーン変換
  // 横オフセットはカメラ右ベクトルで加算
  const cosY=Math.cos(G.camYaw), sinY=Math.sin(G.camYaw);
  // カメラ右方向（XZ平面）
  const rightX= cosY, rightZ=-sinY;
  const wx = G.parryWorldX + rightX * G.parrySideOff;
  const wz = G.parryWorldZ + rightZ * G.parrySideOff;
  const sp = w2s(wx, G.parryWorldY, wz);
  if(sp.scale<=0)return;

  const sz=Math.min(W,H)*0.065;
  const pulse=0.75+Math.sin(G.frameT*0.014)*0.25;
  const sx=sp.x, sy=sp.y;

  ctx.save();
  // 外リング（パルス）
  ctx.beginPath();
  ctx.arc(sx,sy,sz*(1.0+pulse*0.15),0,Math.PI*2);
  ctx.strokeStyle=`rgba(231,76,60,${pulse*0.5})`;
  ctx.lineWidth=2;
  ctx.stroke();

  // メインリング
  ctx.beginPath();
  ctx.arc(sx,sy,sz,0,Math.PI*2);
  ctx.fillStyle='rgba(231,76,60,0.18)';
  ctx.fill();
  ctx.strokeStyle=`rgba(255,80,60,${0.7+pulse*0.3})`;
  ctx.lineWidth=3;
  ctx.stroke();

  // 残り時間バー（外周）
  const remain=G.parryTimer/900;
  ctx.beginPath();
  ctx.arc(sx,sy,sz,-Math.PI/2,-Math.PI/2+Math.PI*2*remain);
  ctx.strokeStyle='rgba(255,200,50,0.9)';
  ctx.lineWidth=4;
  ctx.stroke();

  // 中心アイコン
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.font=`bold ${sz*0.7}px Arial`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('!',sx,sy);

  ctx.restore();
}

// ── touch input ──
const tl=document.getElementById('touch-layer');
const tlb=document.getElementById('touch-layer-bottom');

function isLeftSide(cx){
  return cx < wrap.getBoundingClientRect().left + wrap.offsetWidth*0.5;
}
function isButton(el){
  return el.closest('#btns')!==null;
}

tl.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(isLeftSide(t.clientX)){
      // move stick
      if(!G.stickActive){
        G.stickActive=true;
        G.stickTouchId=t.identifier;
        const r=wrap.getBoundingClientRect();
        G.stickOriginX=t.clientX-r.left;
        G.stickOriginY=t.clientY-r.top;
        G.stickDX=0;G.stickDY=0;
      }
    } else {
      // look
      if(!G.lookActive){
        G.lookActive=true;
        G.lookTouchId=t.identifier;
        G.lookLastX=t.clientX;G.lookLastY=t.clientY;
      }
    }
  }
},{passive:false});

tl.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===G.stickTouchId){
      const r=wrap.getBoundingClientRect();
      const cx=t.clientX-r.left, cy=t.clientY-r.top;
      const R=wrap.offsetWidth*0.07;
      let dx=cx-G.stickOriginX, dy=cy-G.stickOriginY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>R){
        // スティック中心を指に追尾させる (floating)
        const over=d-R;
        G.stickOriginX+=dx/d*over;
        G.stickOriginY+=dy/d*over;
        dx=cx-G.stickOriginX; dy=cy-G.stickOriginY;
      }
      // 斜め入力: 合成ベクトルが1を超えないよう正規化
      const rawLen=Math.sqrt((dx/R)**2+(dy/R)**2);
      if(rawLen>1){G.stickDX=(dx/R)/rawLen;G.stickDY=(dy/R)/rawLen;}
      else{G.stickDX=dx/R;G.stickDY=dy/R;}
    }
    if(t.identifier===G.lookTouchId){
      const ddx=t.clientX-G.lookLastX;
      const ddy=t.clientY-G.lookLastY;
      const sensX=0.005;  // 左右感度
      const sensY=0.004;  // 上下感度
      G.camYaw  += ddx * sensX;
      // 指を下→見下ろす(+), 指を上→見上げる(-)
      G.camPitch = clamp(G.camPitch - ddy * sensY, -1.50, 1.50);
      G.lookLastX=t.clientX;G.lookLastY=t.clientY;
    }
  }
},{passive:false});

tl.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===G.stickTouchId){
      G.stickActive=false;G.stickTouchId=null;
      G.stickDX=0;G.stickDY=0;
      G.moveX=0;G.moveZ=0;
    }
    if(t.identifier===G.lookTouchId){
      G.lookActive=false;G.lookTouchId=null;
    }
  }
},{passive:false});

// 下左エリア（移動スティック専用）
tlb.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(!G.stickActive){
      G.stickActive=true;G.stickTouchId=t.identifier;
      const r=wrap.getBoundingClientRect();
      G.stickOriginX=t.clientX-r.left;G.stickOriginY=t.clientY-r.top;
      G.stickDX=0;G.stickDY=0;
    }
  }
},{passive:false});
tlb.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===G.stickTouchId){
      const r=wrap.getBoundingClientRect();
      const cx=t.clientX-r.left,cy=t.clientY-r.top;
      const R=wrap.offsetWidth*0.07;
      let dx=cx-G.stickOriginX,dy=cy-G.stickOriginY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>R){const o=d-R;G.stickOriginX+=dx/d*o;G.stickOriginY+=dy/d*o;dx=cx-G.stickOriginX;dy=cy-G.stickOriginY;}
      const rl=Math.sqrt((dx/R)**2+(dy/R)**2);
      if(rl>1){G.stickDX=(dx/R)/rl;G.stickDY=(dy/R)/rl;}else{G.stickDX=dx/R;G.stickDY=dy/R;}
    }
  }
},{passive:false});
tlb.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===G.stickTouchId){
      G.stickActive=false;G.stickTouchId=null;G.stickDX=0;G.stickDY=0;G.moveX=0;G.moveZ=0;
    }
  }
},{passive:false});

// ── PC: キーボード + マウス（Pointer Lock方式・FPS風）──
const keys={};
let pointerLocked=false;
let suppressNextClick=false; // ロック取得クリック自体を攻撃扱いしないためのフラグ

function isPCInputTarget(el){
  // ボタンUIやスタート/リトライ画面の上はロック対象外
  return el.closest('#btns')===null && el.closest('.fullscreen')===null;
}

function requestLook(suppressClick){
  if(!G.running)return;
  if(document.pointerLockElement===wrap)return;
  if(suppressClick)suppressNextClick=true;
  try{
    const p=wrap.requestPointerLock();
    if(p&&typeof p.catch==='function'){
      p.catch(()=>{ /* ロック許可されない環境（サンドボックス等）では静かに諦める */ });
    }
  }catch(err){
    // 環境によっては同期的に例外が出ることがあるため握りつぶす
  }
}

// 画面クリックでポインタロック開始（右クリック不要・デフォルトで視点操作可能に）
wrap.addEventListener('mousedown',e=>{
  if(!G.running)return;
  if(!isPCInputTarget(e.target))return;
  if(e.button===0){
    if(document.pointerLockElement!==wrap){
      requestLook(true);
      return; // ロック取得トリガーのクリックは攻撃判定しない
    }
  }
});

document.addEventListener('pointerlockchange',()=>{
  pointerLocked = (document.pointerLockElement===wrap);
});
document.addEventListener('pointerlockerror',()=>{
  pointerLocked=false;
});

// movementX/Y を使うのでカーソル位置に依存せず、画面端で詰まらない
document.addEventListener('mousemove',e=>{
  if(!pointerLocked||!G.running)return;
  const sensX=0.0028, sensY=0.0022;
  G.camYaw  += e.movementX*sensX;
  G.camPitch = clamp(G.camPitch - e.movementY*sensY, -1.50, 1.50);
});

// ロック中の左クリック → 即攻撃（視点操作とドラッグ判定が干渉しないので両立する）
document.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  if(!pointerLocked||!G.running)return;
  if(suppressNextClick){suppressNextClick=false;return;}
  playerAttack();
});

// 右クリックメニュー無効化
wrap.addEventListener('contextmenu',e=>e.preventDefault());

// ゲーム終了/リトライ時など走っていない時はロック解除
function exitLookLock(){
  try{
    if(document.pointerLockElement===wrap)document.exitPointerLock();
  }catch(err){}
}

// WASD
document.addEventListener('keydown',e=>{
  if(!G.running)return;
  keys[e.code]=true;
  if(e.code==='KeyR'){e.preventDefault();toggleSword();}
  if(e.code==='KeyE'){e.preventDefault();spawnEnemy();}
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// WASDをstickに変換
function applyWASD(){
  // タッチスティックが使われていたらWASDは無視
  if(G.stickActive)return;
  let fx=0,fz=0;
  if(keys['KeyW']||keys['ArrowUp'])   fz=-1;
  if(keys['KeyS']||keys['ArrowDown']) fz= 1;
  if(keys['KeyA']||keys['ArrowLeft']) fx=-1;
  if(keys['KeyD']||keys['ArrowRight'])fx= 1;
  const len=Math.sqrt(fx*fx+fz*fz);
  if(len>0){G.stickDX=fx/len;G.stickDY=fz/len;}
  else{G.stickDX=0;G.stickDY=0;}
}

// ── game loop ──
let lastT=0;
function loop(ts){
  if(!G.running)return;
  const dt=Math.min(ts-lastT,50);lastT=ts;
  G.frameT=ts;

  // WASD入力をstickに反映
  applyWASD();

  // 移動: マイクラ方式
  const spd=0.0028*dt;
  const cosY=Math.cos(G.camYaw), sinY=Math.sin(G.camYaw);
  const fwdX= sinY,  fwdZ= cosY;   // カメラ前方ベクトル
  const rgtX= cosY,  rgtZ=-sinY;   // カメラ右方向ベクトル
  const forwardInput=-G.stickDY;   // 上倒し=前進なので反転
  const rightInput  = G.stickDX;
  G.playerX+=(fwdX*forwardInput + rgtX*rightInput)*spd;
  G.playerZ+=(fwdZ*forwardInput + rgtZ*rightInput)*spd;

  const isMoving=Math.abs(G.stickDX)>0.05||Math.abs(G.stickDY)>0.05;
  if(isMoving)G.walkPhase+=dt*0.008;

  // draw anim
  if(G.drawAnimDir!==0){
    G.drawAnim=clamp(G.drawAnim+G.drawAnimDir*dt*0.004,0,1);
    if(G.drawAnim<=0||G.drawAnim>=1)G.drawAnimDir=0;
  }
  // attack anim
  if(G.attackTimer>0){G.attackTimer-=dt;G.attackAnim=G.attackTimer>0?G.attackTimer/260:0;}
  // combo
  if(G.comboTimer>0){G.comboTimer-=dt;if(G.comboTimer<=0){G.combo=0;updateCombo();}}

  enemyAI(dt);
  drawScene();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('sstart').style.display='none';
  document.getElementById('pc-hint').style.display='flex';
  G.running=true;G.playerHP=100;updateHP();
  requestLook(false);
  requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
}
function playerDead(){
  G.running=false;
  exitLookLock();
  document.getElementById('sdead').style.display='flex';
}
function retryGame(){
  document.getElementById('sdead').style.display='none';
  closeParryWindow();
  Object.assign(G,{
    running:true,enemy:null,playerHP:100,swordDrawn:false,
    combo:0,comboTimer:0,camYaw:0,camPitch:0.08,
    playerX:0,playerZ:0,moveX:0,moveZ:0,
    attackAnim:0,attackTimer:0,walkPhase:0,drawAnim:0,drawAnimDir:0,
    parryReady:false,parryTimer:0,parryCallback:null,
    stickActive:false,stickDX:0,stickDY:0,
  });
  document.getElementById('sw-state').textContent='⚔️ 剣: 背中';
  document.getElementById('sw-state').style.color='#f39c12';
  document.getElementById('btn-draw').querySelector('.lbl').textContent='抜刀';
  updateCombo();updateHP();
  requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
}


</script>
</body>
